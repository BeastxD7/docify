# Run only the infrastructure services locally.
# Use this during development — backend and worker run directly with uv.
#
#   docker compose -f docker-compose.infra.yml up -d
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docify
      POSTGRES_USER: docify
      POSTGRES_PASSWORD: docify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/docify_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
